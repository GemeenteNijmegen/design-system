<!doctype html>
<html lang="nl">
  <head>
    <title>Task card example</title>
    <!-- global -->
    <link rel="stylesheet" href="https://unpkg.com/@utrecht/document-css@1.5.0/dist/index.css" />
    <link rel="stylesheet" href="https://unpkg.com/@gemeentenijmegen/design-tokens@latest/dist/index.css" />
    <link rel="stylesheet" href="https://unpkg.com/@gemeentenijmegen/font@latest/dist/index.css" />
    <!-- component specific -->
    <link rel="stylesheet" href="https://unpkg.com/@gemeentenijmegen/components-css@latest/dist/index.min.css" />
  </head>

  <body class="utrecht-document nijmegen-theme">
    <a class="nijmegen-task-card" href="#example">
      <div class="nijmegen-task-card__content">
        <strong>Task</strong>
      </div>
      <div class="nijmegen-task-card__context">
        <div class="nijmegen-task-card__details">
          <div class="nijmegen-task-card__date">
            <time datetime=""></time>
          </div>
        </div>
        <div class="nijmegen-task-card__actions">
          <span class="utrecht-button utrecht-button--primary-action">Text</span>
        </div>
      </div>
    </a>
  </body>
</html>
